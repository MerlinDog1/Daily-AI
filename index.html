<!doctype html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>Daily AI</title><style>body{font-family:Inter,system-ui,Arial;background:#0f1220;color:#e8ebff;margin:0}.wrap{max-width:980px;margin:0 auto;padding:24px}.hero{display:flex;justify-content:space-between;align-items:end;gap:12px}.tag{display:inline-block;padding:4px 10px;border-radius:999px;background:#232947;color:#aab4ff;margin:4px;font-size:12px;cursor:pointer}.tag.active{background:#5b6bff;color:#fff}.card{background:#171c33;border:1px solid #2a315c;border-radius:14px;padding:16px;margin:14px 0}a{color:#9bd0ff}h1,h2,h3{margin:8px 0}.meta{color:#98a2d6;font-size:13px}</style></head><body><div class='wrap'><div class='hero'><div><h1>Daily AI</h1><div class='meta'>Fresh AI briefings, newest first. Updated daily at 05:00 UTC.</div></div></div><div id='tags'></div><div id='feed'></div></div><script>
let active='all';fetch('data/posts.json').then(r=>r.json()).then(data=>{const tags=[...new Set(data.flatMap(d=>d.tags))];const t=document.getElementById('tags');t.innerHTML='<span class="tag active" data-tag="all">all</span>'+tags.map(x=>`<span class="tag" data-tag="${x}">${x}</span>`).join('');function render(){const items=active==='all'?data:data.filter(d=>d.tags.includes(active));document.getElementById('feed').innerHTML=items.map(day=>`<article class="card"><h2>${day.date} — ${day.title}</h2><div class="meta">${day.summary}</div>${day.sections.map(s=>`<h3>${s.name}</h3><ul>${s.items.map(i=>`<li><a href="${i.url}" target="_blank">${i.headline}</a> — ${i.note}</li>`).join('')}</ul>`).join('')}<h3>How we can use this</h3><p>${day.implementation}</p></article>`).join('');document.querySelectorAll('.tag').forEach(el=>el.classList.toggle('active',el.dataset.tag===active));}t.onclick=(e)=>{if(e.target.dataset.tag){active=e.target.dataset.tag;render();}};render();});
</script></body></html>
